# Enterprise Platform - Loki Values
loki:
  auth_enabled: false
  storage:
    type: filesystem
  storage_config:
    filesystem:
      directory: /loki/storage
  commonConfig:
    replication_factor: 1

singleBinary:
  replicas: 1

monitoring:
  dashboards:
    enabled: true
  serviceMonitor:
    enabled: true

gateway:
  enabled: false

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0
