# Enterprise Platform - Loki Values
loki:
  auth_enabled: false
  storage:
    type: filesystem
  storage_config:
    filesystem:
      directory: /loki/storage
  commonConfig:
    replication_factor: 1
  schema_config:
    configs:
      - from: "2024-01-01"
        store: filesystem
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - loki.localhost
    paths:
      - /

monitoring:
  dashboards:
    enabled: true
  serviceMonitor:
    enabled: true

gateway:
  enabled: false

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0
