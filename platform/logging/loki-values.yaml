# Enterprise Platform - Loki Values
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  storage:
    type: filesystem
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - loki.localhost
    paths:
      - /

gateway:
  enabled: false

minio:
  enabled: false

monitoring:
  dashboards:
    enabled: true
  serviceMonitor:
    enabled: true

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0
