# Enterprise Platform - NGINX Ingress Controller Values
controller:
  replicaCount: 2
  service:
    type: LoadBalancer
  config:
    use-forwarded-headers: "true"
    ssl-protocols: "TLSv1.2 TLSv1.3"
    proxy-body-size: "50m"
    hsts: "true"
    enable-cors: "true"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
