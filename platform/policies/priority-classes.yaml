# =============================================================================
# Enterprise Platform - Priority Classes
# =============================================================================
# Defines pod priority levels to protect system components during resource pressure.
#
# When the VPS runs out of resources, Kubernetes evicts pods in this order:
#   1. app-low (IUMBIT and user apps) - first to be evicted
#   2. platform-high (ArgoCD, cert-manager, monitoring) - protected
#   3. platform-critical (ArgoCD, cert-manager, monitoring) - highly protected
#   4. system-critical (built-in: kube-system, etcd, API server) - never evicted
# =============================================================================

---
# Priority: platform-critical (highest custom)
# Protects: ArgoCD, cert-manager, monitoring stack, ingress controller
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: platform-critical
value: 1000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Maximum priority for platform infrastructure components"

---
# Priority: platform-high (medium)
# Protects: ArgoCD, cert-manager, monitoring stack, ingress controller
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: platform-high
value: 100000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "High priority for platform infrastructure components"

---
# Priority: app-low (lowest)
# Applies to: IUMBIT and other user applications
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: app-low
value: 1000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Low priority for user applications - first to be evicted"
