# =============================================================================
# Enterprise Platform - Platform Policies ApplicationSet
# =============================================================================
# Deploys ResourceQuota, LimitRange, and PriorityClass via ArgoCD.
# Uses directory source to apply raw YAML from platform/policies/.
#
# Each registered ArgoCD cluster gets all policies applied.
# This ensures consistent resource protection across all environments.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-policies
  namespace: gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: "platform-{{ .name }}-policies"
    spec:
      project: enterprise-platform
      sources:
        - repoURL: https://github.com/JFranOFigueroa/enterprise-platform.git
          targetRevision: main
          path: platform/policies
          directory:
            recurse: false
      destination:
        server: "{{ .server }}"
        namespace: ""
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
