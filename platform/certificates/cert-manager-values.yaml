# Enterprise Platform - cert-manager Values
# Chart: cert-manager v1.17.1 from https://charts.jetstack.io
# Docs: https://cert-manager.io/docs/installation/helm/

crds:
  enabled: true
  keep: true

replicaCount: 2

prometheus:
  enabled: true
  servicemonitor:
    enabled: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
