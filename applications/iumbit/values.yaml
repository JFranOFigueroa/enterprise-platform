# Enterprise Platform - IUMBIT Base Values
global:
  environment: dev

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18.0-trixie"
  auth:
    postgresPassword: postgres
    database: iumbit
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

backend:
  enabled: true
  image:
    repository: nitesoftmx/iumbit-wildfly-app
    tag: "v1.0.0-dev.16"
  port: 8079
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  hpa:
    enabled: false

frontend:
  enabled: true
  image:
    repository: nitesoftmx/iumbit-nginx-web
    tag: "v1.0.0-dev.3"
  port: 8080
  replicas: 1
  vueAppApiUrl: "/check-it-1.0.0-dev.16/api/v1/"
  vueCliTest: "true"
  vueAppGoogleClientId: "CHANGE_ME"
  vueAppMicrosoftClientId: "CHANGE_ME"
  vueAppMicrosoftTenantId: "common"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: false

secrets:
  dbUsername: "CHANGE_ME"
  dbPassword: "CHANGE_ME"
  jwtSecretKey: "CHANGE_ME"
  googleClientId: "CHANGE_ME"
  googleClientSecret: "CHANGE_ME"
  microsoftClientId: "CHANGE_ME"
  microsoftTenantId: "CHANGE_ME"
  mailUsername: "CHANGE_ME"
  mailPassword: "CHANGE_ME"

config:
  serverPort: "8079"
  dbUrl: "jdbc:postgresql://iumbit-postgresql:5432/iumbit"
  checkitFrontRegisterView: "http://192.168.0.101:8080/register"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: iumbit.local
      paths:
        - path: /
          pathType: Prefix
          serviceName: frontend
          servicePort: 8080
        - path: /check-it-1.0.0-dev.16
          pathType: Prefix
          serviceName: backend
          servicePort: 8079
  tls: []
