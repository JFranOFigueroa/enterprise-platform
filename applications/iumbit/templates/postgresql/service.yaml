apiVersion: v1
kind: Service
metadata:
  name: {{ include "iumbit.fullname" . }}-postgresql
  labels:
    {{- include "iumbit.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "iumbit.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
