global:
  environment: production

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18.0-trixie"
  auth:
    postgresPassword: "CHANGE_ME_PRODUCTION_DB_PASSWORD"
    database: iumbit
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClassName: local-path
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

backend:
  enabled: true
  image:
    repository: nitesoftmx/iumbit-wildfly-app
    tag: "v1.0.0-dev.17"
  port: 8080
  replicas: 1
  javaOpts: "-Xms256m -Xmx512m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1.5Gi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
          - type: Pods
            value: 1
            periodSeconds: 60
        selectPolicy: Min

frontend:
  enabled: true
  image:
    repository: nitesoftmx/iumbit-nginx-web
    tag: "v1.0.0-dev.4"
  port: 8080
  replicas: 1
  vueAppApiUrl: "/check-it-1.0.0-dev.17/api/v1/"
  vueCliTest: "true"
  vueAppGoogleClientId: "CHANGE_ME"
  vueAppMicrosoftClientId: "CHANGE_ME"
  vueAppMicrosoftTenantId: "common"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
          - type: Pods
            value: 1
            periodSeconds: 60
        selectPolicy: Min

secrets:
  dbUsername: "CHANGE_ME"
  dbPassword: "CHANGE_ME"
  jwtSecretKey: "CHANGE_ME"
  googleClientId: "CHANGE_ME"
  googleClientSecret: "CHANGE_ME"
  microsoftClientId: "CHANGE_ME"
  microsoftTenantId: "CHANGE_ME"
  mailUsername: "CHANGE_ME"
  mailPassword: "CHANGE_ME"

config:
  serverPort: "8080"
  dbUrl: "jdbc:postgresql://iumbit-postgresql:5432/iumbit"
  checkitFrontRegisterView: "https://bta.iumbit.com.mx/register"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-production
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
          serviceName: frontend
          servicePort: 8080
        - path: /check-it-1.0.0-dev.17
          pathType: Prefix
          serviceName: backend
          servicePort: 8080

    - host: iumbit.example.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: frontend
          servicePort: 8080
        - path: /check-it-1.0.0-dev.17
          pathType: Prefix
          serviceName: backend
          servicePort: 8080

    - host: bta.iumbit.com.mx
      paths:
        - path: /
          pathType: Prefix
          serviceName: frontend
          servicePort: 8080
        - path: /check-it-1.0.0-dev.17
          pathType: Prefix
          serviceName: backend
          servicePort: 8080
  tls:
    - secretName: iumbit-tls
      hosts:
        - iumbit.example.com
        - bta.iumbit.com.mx
