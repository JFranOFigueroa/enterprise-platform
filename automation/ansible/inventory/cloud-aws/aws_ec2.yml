---
# AWS EC2 Dynamic Inventory
plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

filters:
  tag:Project:
    - enterprise-platform

keyed_groups:
  - key: tags
    prefix: tag
  - key: placement.availability_zone
    prefix: az
  - key: instance_type
    prefix: type

compose:
  ansible_host: public_ip_address
  ansible_user: "'ubuntu'"
  ansible_ssh_private_key_file: "'~/.ssh/enterprise-platform'"
