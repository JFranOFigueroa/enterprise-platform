---
# Enterprise Platform - AWS Inventory
# Environment:   cloud-aws
# Provisioner:   Terraform (AWS EC2)
# Ansible:       ansible-playbook -i inventory/cloud-aws/hosts.yml playbooks/site.yml

all:
  children:
    rke2_servers:
      hosts:
        master-01:
          ansible_host: "{{ master_ip }}"
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/enterprise-platform
          node_ip: "{{ master_ip }}"
      vars:
        rke2_type: server
        node_role: control-plane

    rke2_agents:
      hosts:
        worker-01:
          ansible_host: "{{ worker_01_ip }}"
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/enterprise-platform
          node_ip: "{{ worker_01_ip }}"
        worker-02:
          ansible_host: "{{ worker_02_ip }}"
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/enterprise-platform
          node_ip: "{{ worker_02_ip }}"
      vars:
        rke2_type: agent
        node_role: worker

    rke2_cluster:
      children:
        rke2_servers:
        rke2_agents:

  vars:
    ansible_become: true
    ansible_become_method: sudo
