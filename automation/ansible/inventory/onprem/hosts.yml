---
# Enterprise Platform - On-Premise Inventory (Single-Node)
# Environment:   onprem (single-node)
# Provisioner:   Existing VPS / Physical servers
# Ansible:       ./run-ansible.sh -i inventory/onprem/hosts.yml site.yml
#
# Default: Single-node cluster (master-01 only).
# For multi-node with workers, use hosts-workers.yml with --workers flag.
# For localhost deployment (repo on the server), use hosts-local.yml.
#
# Variables from group_vars/secrets.yml (required):
#   onprem_user              - SSH user (e.g., ansible)
#   onprem_master_host       - Master SSH hostname/IP
#   onprem_master_node_ip    - Master internal IP for RKE2
#   onprem_private_key       - Path to SSH private key

all:
  children:
    rke2_servers:
      hosts:
        master-01:
          ansible_host: "{{ onprem_master_host }}"
          ansible_port: 22
          ansible_user: "{{ onprem_user }}"
          ansible_ssh_private_key_file: "{{ onprem_private_key }}"
          node_ip: "{{ onprem_master_node_ip }}"
      vars:
        rke2_type: server
        node_role: control-plane

    rke2_cluster:
      children:
        rke2_servers:

  vars:
    ansible_become: true
    ansible_become_method: sudo
