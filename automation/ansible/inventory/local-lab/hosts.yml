---
# Enterprise Platform - Local Lab Inventory (Vagrant)
# Environment:   local-lab
# Provisioner:   Vagrant (VMware Desktop)
# Network:       192.168.56.0/24 (inter-VM), port forwarding for host access
# Ansible:       ./run-ansible.sh -i inventory/local-lab/hosts.yml playbooks/site.yml
#
# NOTE: VMware Desktop uses NAT + port forwarding for host→VM access.
#       VMs communicate via private_network (192.168.56.x).
#       The host cannot reach 192.168.56.x directly (VMnet1 subnet mismatch).
#       SSH access is via 127.0.0.1 with forwarded ports.
#       From WSL2, use host.docker.internal to reach Windows host.

all:
  children:
    rke2_servers:
      hosts:
        master-01:
          ansible_host: host.docker.internal
          ansible_port: 2222
          ansible_user: vagrant
          ansible_ssh_private_key_file: ../../../../infrastructure/local-lab/vagrant/.vagrant/machines/ep-master-01/vmware_desktop/private_key
          node_ip: 192.168.56.10
      vars:
        rke2_type: server
        node_role: control-plane

    rke2_agents:
      hosts:
        worker-01:
          ansible_host: host.docker.internal
          ansible_port: 2200
          ansible_user: vagrant
          ansible_ssh_private_key_file: ../../../../infrastructure/local-lab/vagrant/.vagrant/machines/ep-worker-01/vmware_desktop/private_key
          node_ip: 192.168.56.11
        worker-02:
          ansible_host: host.docker.internal
          ansible_port: 2201
          ansible_user: vagrant
          ansible_ssh_private_key_file: ../../../../infrastructure/local-lab/vagrant/.vagrant/machines/ep-worker-02/vmware_desktop/private_key
          node_ip: 192.168.56.12
      vars:
        rke2_type: agent
        node_role: worker

    rke2_cluster:
      children:
        rke2_servers:
        rke2_agents:

  vars:
    ansible_become: true
    ansible_become_method: sudo
