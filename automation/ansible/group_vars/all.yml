---
# Enterprise Platform - Global Variables
# Applied to ALL hosts in ALL environments

# Project
project_name: enterprise-platform
cluster_domain: cluster.local

# Environment configuration
# target_environment: passed via --extra-vars from run-ansible.sh
# Default: dev-local (local development with ArgoCD managing only itself)
# Options: dev-local, dev, qa, staging, production
target_environment: dev-local

# ArgoCD mode:
#   local  = ArgoCD manages only this cluster (dev-local fallback)
#   managed = ArgoCD manages this cluster from a remote management plane
argocd_mode: local

# Kubernetes networking
pod_cidr: 10.42.0.0/16
service_cidr: 10.43.0.0/16

# Time
timezone: America/Mexico_City
ntp_server: pool.ntp.org

# RKE2
rke2_version: "v1.31.4+rke2r1"
rke2_cni: calico
rke2_token: "{{ vault_rke2_token | default('enterprise-platform-local-lab-token-2026') }}"

# Common packages
common_packages:
  - curl
  - wget
  - vim
  - git
  - htop
  - net-tools
  - jq
  - unzip
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - chrony
  - ufw

# ======================================
# Applications to deploy
# ======================================
# Each app must have: applications/<name>/app_vars/<name>-<environment>.yml
# with app metadata (name, namespace, valuesFile, repoPath) and secrets.
# Ansible loads app_vars/<name>-{{ target_environment }}.yml automatically.
applications:
  - name: iumbit
