---
# Install RKE2 server

- name: Download RKE2 install script
  ansible.builtin.get_url:
    url: https://get.rke2.io
    dest: /tmp/rke2-install.sh
    mode: "0755"

- name: Install RKE2 server
  ansible.builtin.shell: |
    echo "=== RKE2 Server Installation ==="
    echo "Version: {{ rke2_version }}"
    echo "Starting download and install..."
    echo ""
    stdbuf -oL sh /tmp/rke2-install.sh
    echo ""
    echo "=== RKE2 Server Installation Complete ==="
  args:
    creates: /usr/local/bin/rke2-server
  environment:
    INSTALL_RKE2_TYPE: server
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"

- name: Create RKE2 config directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: "0755"

- name: Deploy RKE2 server configuration
  ansible.builtin.template:
    src: rke2-server.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: "0644"
  notify: restart_rke2_server

- name: Set PATH and KUBECONFIG for interactive shells
  ansible.builtin.copy:
    dest: /etc/profile.d/rke2.sh
    content: |
      export PATH=$PATH:/var/lib/rancher/rke2/bin
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
    mode: "0644"

- name: Enable RKE2 server service
  ansible.builtin.systemd:
    name: rke2-server
    enabled: true
    daemon_reload: true

- name: Start RKE2 server
  ansible.builtin.command:
    cmd: systemctl start rke2-server
  async: 600
  poll: 0
  register: rke2_server_start

- name: Wait for RKE2 server to be ready
  ansible.builtin.wait_for:
    path: /etc/rancher/rke2/rke2.yaml
    state: present
    timeout: 600

- name: Check RKE2 server start result
  ansible.builtin.async_status:
    jid: "{{ rke2_server_start.ansible_job_id }}"
  register: job_result
  until: job_result.finished
  retries: 30
  delay: 10
  when: rke2_server_start.ansible_job_id is defined
