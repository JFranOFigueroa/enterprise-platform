---
# Install RKE2 agent

- name: Download RKE2 install script
  ansible.builtin.get_url:
    url: https://get.rke2.io
    dest: /tmp/rke2-install.sh
    mode: "0755"

- name: Install RKE2 agent
  ansible.builtin.shell: |
    echo "=== RKE2 Agent Installation ==="
    echo "Version: {{ rke2_version }}"
    echo "Starting download and install..."
    echo ""
    sh /tmp/rke2-install.sh
    echo ""
    echo "=== RKE2 Agent Installation Complete ==="
  args:
    creates: /usr/local/bin/rke2-agent
  register: rke2_agent_install
  environment:
    INSTALL_RKE2_TYPE: agent
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"

- name: Show RKE2 agent install output
  ansible.builtin.debug:
    var: rke2_agent_install.stdout_lines
  when: rke2_agent_install is changed

- name: RKE2 agent already installed
  ansible.builtin.debug:
    msg: "RKE2 agent v{{ rke2_version }} already installed, skipping."
  when: rke2_agent_install is not changed

- name: Create RKE2 config directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: "0755"

- name: Deploy RKE2 agent configuration
  ansible.builtin.template:
    src: rke2-agent.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: "0644"

- name: Set PATH and KUBECONFIG for interactive shells
  ansible.builtin.copy:
    dest: /etc/profile.d/rke2.sh
    content: |
      export PATH=$PATH:/var/lib/rancher/rke2/bin
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
    mode: "0644"

- name: Enable RKE2 agent service
  ansible.builtin.systemd:
    name: rke2-agent
    enabled: true
    daemon_reload: true

- name: Start RKE2 agent
  ansible.builtin.command:
    cmd: systemctl start rke2-agent
  async: 300
  poll: 0
  register: rke2_agent_start
