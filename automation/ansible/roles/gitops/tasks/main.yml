---
# Deploy ArgoCD via Helm

- name: Set RKE2 bin path
  ansible.builtin.set_fact:
    rke2_bin: /var/lib/rancher/rke2/bin
    rke2_kubeconfig: /etc/rancher/rke2/rke2.yaml

- name: Download and install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add ArgoCD Helm repository
  ansible.builtin.command:
    cmd: helm repo add argo https://argoproj.github.io/argo-helm
    creates: /root/.cache/helm/repository/argo-index.yaml
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Update Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: true
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Create gitops namespace
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl create namespace gitops"
  register: namespace_result
  changed_when: "'created' in namespace_result.stdout"
  failed_when: namespace_result.rc != 0 and 'already exists' not in namespace_result.stderr
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Deploy ArgoCD
  ansible.builtin.command:
    cmd: >
      helm upgrade --install argocd argo/argo-cd
      --namespace gitops
      --set global.image.tag=v2.13.3
      --set server.service.type=NodePort
      --set server.service.nodePortHttp=30080
      --set server.service.nodePortHttps=30443
      --set dex.enabled=false
      --set applicationSet.enabled=true
      --wait
      --timeout 5m
  changed_when: true
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Bootstrap GitOps: Clone repo, deploy platform resources, apply Applications
# =============================================================================

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: Use local repository (if available)
  ansible.builtin.set_fact:
    repo_dest: "{{ project_root }}"
  when: >-
    project_root is defined and project_root | length > 0 and
    (project_root + '/platform/storage/local-path-provisioner.yaml') is file

- name: Clone enterprise-platform repository (fallback)
  ansible.builtin.git:
    repo: https://github.com/JFranOFigueroa/enterprise-platform.git
    dest: "{{ repo_clone_dest }}"
    version: main
    force: true
  when: repo_dest is not defined or repo_dest | length == 0

- name: Set repository destination (fallback)
  ansible.builtin.set_fact:
    repo_dest: "{{ repo_clone_dest }}"
  when: repo_dest is not defined or repo_dest | length == 0

- name: Apply local-path-provisioner
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f {{ repo_dest }}/platform/storage/local-path-provisioner.yaml"
  register: lpp_result
  changed_when: "'created' in lpp_result.stdout or 'configured' in lpp_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Wait for ArgoCD to be fully ready
# helm --wait only ensures the server Deployment is Available, but the
# Application Controller needs extra time to initialize and start processing
# Applications. Without this wait, subsequent kubectl apply of ArgoCD
# Applications may silently fail because the controller isn't ready yet.
# =============================================================================

- name: Wait for ArgoCD server to be ready
  ansible.builtin.command:
    cmd: >
      {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }}
      wait --for=condition=Available deployment/argocd-server
      -n gitops --timeout=180s
  register: argocd_wait
  until: argocd_wait.rc == 0
  retries: 12
  delay: 15
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for ArgoCD Application Controller to be ready
  ansible.builtin.command:
    cmd: >
      {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }}
      wait --for=condition=Ready pod
      -l app.kubernetes.io/name=argocd-application-controller
      -n gitops --timeout=180s
  register: argocd_ctrl_wait
  until: argocd_ctrl_wait.rc == 0
  retries: 12
  delay: 15
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for ArgoCD ApplicationSet Controller to be ready
  ansible.builtin.command:
    cmd: >
      {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }}
      wait --for=condition=Ready pod
      -l app.kubernetes.io/name=argocd-applicationset-controller
      -n gitops --timeout=180s
  register: argocd_appset_wait
  until: argocd_appset_wait.rc == 0
  retries: 12
  delay: 15
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Apply ArgoCD Resources
# =============================================================================

- name: Apply ArgoCD AppProject
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f {{ repo_dest }}/platform/components/project.yaml"
  register: project_result
  changed_when: "'created' in project_result.stdout or 'configured' in project_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Apply app-of-apps
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f {{ repo_dest }}/bootstrap/gitops/argocd/app-of-apps.yaml"
  register: appofapps_result
  changed_when: "'created' in appofapps_result.stdout or 'configured' in appofapps_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Cluster Registration (BEFORE app-of-platform)
# Register the cluster in ArgoCD FIRST so the matrix generator in
# platform-apps.yaml can find clusters when ApplicationSet is applied.
# The clusters generator requires a Secret with label
# argocd.argoproj.io/secret-type: cluster to generate Applications.
# =============================================================================

- name: Register local cluster in ArgoCD (dev-local mode)
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f {{ repo_dest }}/platform/registration/cluster-local.yaml"
  register: cluster_reg_result
  changed_when: "'created' in cluster_reg_result.stdout or 'configured' in cluster_reg_result.stdout"
  when: argocd_mode == "local" and target_environment == "dev-local"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Register cluster in ArgoCD (non-dev-local local mode)
  ansible.builtin.template:
    src: "{{ repo_dest }}/platform/components/cluster-template.yaml.j2"
    dest: "/tmp/cluster-{{ target_environment }}-registration.yaml"
    mode: "0600"
  register: cluster_template_render
  when: argocd_mode == "local" and target_environment != "dev-local"

- name: Apply cluster registration template
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f /tmp/cluster-{{ target_environment }}-registration.yaml"
  register: cluster_reg_result
  changed_when: "'created' in cluster_reg_result.stdout or 'configured' in cluster_reg_result.stdout"
  when: argocd_mode == "local" and target_environment != "dev-local"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for cluster Secret to be visible in ArgoCD
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get secret cluster-{{ target_environment }} -n gitops -o jsonpath='{.metadata.name}' 2>/dev/null || echo "not-found"
  register: cluster_secret_check
  until: cluster_secret_check.stdout == "cluster-" + target_environment
  retries: 10
  delay: 5
  changed_when: false
  when: argocd_mode == "local"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Apply app-of-platform (AFTER cluster registration)
# Now the ApplicationSet matrix generator will find the cluster Secret
# and generate Applications for all platform components.
# =============================================================================

- name: Apply app-of-platform
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f {{ repo_dest }}/bootstrap/gitops/argocd/app-of-platform.yaml"
  register: appofplatform_result
  changed_when: "'created' in appofplatform_result.stdout or 'configured' in appofplatform_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Wait for app-of-platform to sync
# ArgoCD Application Controller needs time to detect the Application,
# clone the repo, process the directory, and apply resources.
# The wait tolerates intermediate states (OutOfSync, SyncPending) and
# only fails if the Application doesn't exist after sufficient time.
# =============================================================================

- name: Wait for app-of-platform to exist
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get application app-of-platform -n gitops -o jsonpath='{.metadata.name}' 2>/dev/null || echo "not-found"
  register: appofplatform_exists
  until: appofplatform_exists.stdout == "app-of-platform"
  retries: 30
  delay: 5
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for app-of-platform to be Synced
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get application app-of-platform -n gitops -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown"
  register: appofplatform_sync
  until: >
    appofplatform_sync.stdout == "Synced" or
    appofplatform_sync.stdout == "OutOfSync" or
    appofplatform_sync.stdout == "SyncPending"
  retries: 60
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for app-of-platform to be Healthy
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get application app-of-platform -n gitops -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown"
  register: appofplatform_health
  until: >
    appofplatform_health.stdout == "Healthy" or
    appofplatform_health.stdout == "Progressing" or
    appofplatform_health.stdout == "Degraded"
  retries: 60
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Wait for Platform Components (cert-manager first)
# Two strategies:
#   1. Primary: Wait via ArgoCD Application status (declarative)
#   2. Fallback: Wait directly for cert-manager namespace and pods (imperative)
# =============================================================================

- name: Wait for cert-manager ArgoCD Application to appear
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get application platform-{{ target_environment }}-cert-manager -n gitops -o jsonpath='{.metadata.name}' 2>/dev/null || echo "not-found"
  register: cm_app_check
  until: cm_app_check.stdout == "platform-" + target_environment + "-cert-manager"
  retries: 30
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for cert-manager Application to be Synced
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get application platform-{{ target_environment }}-cert-manager -n gitops -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown"
  register: cm_sync_status
  until: >
    cm_sync_status.stdout == "Synced" or
    cm_sync_status.stdout == "OutOfSync"
  retries: 60
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for cert-manager Application to be Healthy
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get application platform-{{ target_environment }}-cert-manager -n gitops -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown"
  register: cm_health_status
  until: >
    cm_health_status.stdout == "Healthy" or
    cm_health_status.stdout == "Progressing"
  retries: 60
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# cert-manager Fallback Waits (imperative)
# If the ArgoCD Application path fails (e.g. Application never appears),
# these waits ensure cert-manager is actually deployed before proceeding.
# =============================================================================

- name: Wait for cert-manager namespace to exist
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get namespace cert-manager
  register: cm_ns_check
  until: cm_ns_check.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for cert-manager controller pods to be running
  ansible.builtin.shell: |
    {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} get pods -n cert-manager -l app.kubernetes.io/name=cert-manager -o jsonpath='{range .items[*]}{.status.phase}{"\n"}{end}' | grep -c Running
  register: cm_running
  until: cm_running.stdout | int >= 1
  retries: 30
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.command:
    cmd: >
      {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }}
      wait --for=condition=Available deployment/platform-{{ target_environment }}-cert-manager-webhook
      -n cert-manager --timeout=600s
  register: cm_webhook_wait
  until: cm_webhook_wait.rc == 0
  retries: 30
  delay: 10
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Application Deployment (Generic)
# Reads app metadata from applications/<name>/app_vars/<name>.yml
# Each application is self-contained - no platform-level app-specific config.
# =============================================================================

- name: Deploy applications
  ansible.builtin.include_tasks: deploy-application.yml
  loop: "{{ applications | default([]) }}"
  loop_control:
    loop_var: app_entry
  when: applications is defined and applications | length > 0

- name: Apply ClusterIssuers
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f {{ repo_dest }}/platform/certificates/clusterissuers.yaml"
  register: issuers_result
  changed_when: "'created' in issuers_result.stdout or 'configured' in issuers_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
