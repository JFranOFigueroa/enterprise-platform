---
# Deploy ArgoCD via Helm

- name: Set RKE2 bin path
  ansible.builtin.set_fact:
    rke2_bin: /var/lib/rancher/rke2/bin
    rke2_kubeconfig: /etc/rancher/rke2/rke2.yaml

- name: Download and install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add ArgoCD Helm repository
  ansible.builtin.command:
    cmd: helm repo add argo https://argoproj.github.io/argo-helm
    creates: /root/.cache/helm/repository/argo-index.yaml
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Update Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: true
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Create gitops namespace
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl create namespace gitops"
  register: namespace_result
  changed_when: "'created' in namespace_result.stdout"
  failed_when: namespace_result.rc != 0 and 'already exists' not in namespace_result.stderr
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Deploy ArgoCD
  ansible.builtin.command:
    cmd: >
      helm upgrade --install argocd argo/argo-cd
      --namespace gitops
      --set global.image.tag=v2.13.3
      --set server.service.type=NodePort
      --set server.service.nodePortHttp=30080
      --set server.service.nodePortHttps=30443
      --set dex.enabled=false
      --set applicationSet.enabled=true
      --wait
      --timeout 5m
  changed_when: true
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

# =============================================================================
# Bootstrap GitOps: Clone repo, deploy platform resources, apply Applications
# =============================================================================

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: Clone enterprise-platform repository
  ansible.builtin.git:
    repo: https://github.com/JFranOFigueroa/enterprise-platform.git
    dest: /opt/enterprise-platform
    version: main
    force: true

- name: Apply local-path-provisioner
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f /opt/enterprise-platform/platform/storage/local-path-provisioner.yaml"
  register: lpp_result
  changed_when: "'created' in lpp_result.stdout or 'configured' in lpp_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for ArgoCD server to be ready
  ansible.builtin.command:
    cmd: >
      {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }}
      wait --for=condition=Available deployment/argocd-server
      -n gitops --timeout=180s
  register: argocd_wait
  until: argocd_wait.rc == 0
  retries: 12
  delay: 15
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Apply ArgoCD AppProject
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f /opt/enterprise-platform/platform/components/project.yaml"
  register: project_result
  changed_when: "'created' in project_result.stdout or 'configured' in project_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Apply app-of-apps
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f /opt/enterprise-platform/bootstrap/gitops/argocd/app-of-apps.yaml"
  register: appofapps_result
  changed_when: "'created' in appofapps_result.stdout or 'configured' in appofapps_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Apply app-of-platform
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f /opt/enterprise-platform/bootstrap/gitops/argocd/app-of-platform.yaml"
  register: appofplatform_result
  changed_when: "'created' in appofplatform_result.stdout or 'configured' in appofplatform_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.command:
    cmd: >
      {{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }}
      wait --for=condition=Available deployment/cert-manager-webhook
      -n cert-manager --timeout=300s
  register: cm_webhook_wait
  until: cm_webhook_wait.rc == 0
  retries: 15
  delay: 20
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml

- name: Apply ClusterIssuers
  ansible.builtin.command:
    cmd: "{{ rke2_bin }}/kubectl --kubeconfig {{ rke2_kubeconfig }} apply -f /opt/enterprise-platform/platform/certificates/clusterissuers.yaml"
  register: issuers_result
  changed_when: "'created' in issuers_result.stdout or 'configured' in issuers_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
