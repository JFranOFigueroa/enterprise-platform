---
# Ubuntu-specific tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: [ubuntu, packages]

- name: Install Ubuntu-specific packages
  ansible.builtin.apt:
    name:
      - linux-headers-generic
      - linux-generic
    state: present
  tags: [ubuntu, kernel]

- name: Check if unattended-upgrades service exists
  ansible.builtin.shell: systemctl list-unit-files | grep -q unattended-upgrades
  register: unattended_check
  changed_when: false
  failed_when: false
  tags: [ubuntu, services]

- name: Disable unattended upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: stopped
    enabled: false
  when: unattended_check.rc == 0
  tags: [ubuntu, services]
