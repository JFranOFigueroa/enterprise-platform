apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-loki
  namespace: gitops
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.24.0
    - repoURL: https://github.com/JFranOFigueroa/enterprise-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  helm:
    valueFiles:
      - $values/platform/logging/loki-values.yaml
