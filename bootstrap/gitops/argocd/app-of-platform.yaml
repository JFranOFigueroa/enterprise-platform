# Enterprise Platform - App of Platform (Platform Components)
# Manages ArgoCD Applications/ApplicationSets for platform infrastructure.
# Watches: platform/components/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-platform
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: enterprise-platform
  source:
    repoURL: https://github.com/JFranOFigueroa/enterprise-platform.git
    targetRevision: main
    path: platform/components
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
